services:
  backend:
    build:
      context: ./backend
    container_name: arcade-station-api
    restart: unless-stopped
    volumes:
      - ./roms:/data/roms
      - ./covers:/data/covers
      - ./videos:/data/videos
      - ./metadata:/data/metadata
      - ./saves:/data/saves
    environment:
      - TZ=${TZ:-America/Santiago}

  web:
    image: nginx:alpine
    container_name: arcade-station-web
    restart: unless-stopped
    ports:
      - "${ARCADE_PORT:-8990}:80"
    volumes:
volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./roms:/usr/share/nginx/html/roms:ro
      - ./covers:/usr/share/nginx/html/covers:ro
      - ./videos:/usr/share/nginx/html/videos:ro
    depends_on:
      - backend
